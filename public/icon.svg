<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <rect width="512" height="512" rx="128" fill="#0f172a"/>
  <g transform="translate(64, 64)">
    <!-- Wallet body -->
    <rect x="40" y="110" width="300" height="210" rx="28" fill="#1e293b" stroke="#334155" stroke-width="12"/>
    <!-- Gold coins popping out slightly -->
    <circle cx="150" cy="100" r="32" fill="#fbbf24" stroke="#d97706" stroke-width="6"/>
    <circle cx="210" cy="85" r="26" fill="#fbbf24" stroke="#d97706" stroke-width="6"/>
    <!-- Coins details (inner design) -->
    <circle cx="150" cy="100" r="16" fill="none" stroke="#d97706" stroke-width="3"/>
    <circle cx="210" cy="85" r="12" fill="none" stroke="#d97706" stroke-width="3"/>
    <!-- Wallet body front overlay -->
    <path d="M 40,180 L 340,180 L 340,320 C 340,332 330,342 318,342 L 62,342 C 50,342 40,332 40,320 Z" fill="#1e293b"/>
    <!-- Accent strip -->
    <path d="M 40,180 L 340,180" stroke="#10b981" stroke-width="10" stroke-linecap="round"/>
    <!-- Flap -->
    <path d="M 250,170 L 330,170 C 344,170 354,180 354,194 L 354,246 C 354,260 344,270 330,270 L 250,270 Z" fill="#10b981" stroke="#059669" stroke-width="8"/>
    <!-- Gold button / snap -->
    <circle cx="304" cy="220" r="14" fill="#fbbf24" stroke="#d97706" stroke-width="3"/>
    <!-- Plus symbol on coin to represent Hisaab / income -->
    <path d="M 144,100 L 156,100 M 150,94 L 150,106" stroke="#d97706" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
